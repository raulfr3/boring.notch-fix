name: Cloud Mac Builder

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Download the Gesture update
        uses: actions/checkout@v4
        with:
          repository: TheBoredTeam/boring.notch
          ref: refs/pull/1100/head

      - name: 2. Inject Fixes, NotchNook Stretch & Directions
        shell: python
        run: |
          import os

          # 1. Update MusicManager Safely (Never Close Timer)
          mm_path = "boringNotch/managers/MusicManager.swift"
          with open(mm_path, "r") as file: mm_code = file.read()
          mm_code = mm_code.replace(
              "try? await Task.sleep(for: .seconds(Defaults[.waitInterval]))",
              "guard Defaults[.waitInterval] > 0 else { return }\n        try? await Task.sleep(for: .seconds(Defaults[.waitInterval]))"
          )
          with open(mm_path, "w") as file: file.write(mm_code)
              
          # 2. Update SettingsView (UI text "Never")
          sv_path = "boringNotch/components/Settings/SettingsView.swift"
          with open(sv_path, "r") as file: sv_code = file.read()
          sv_code = sv_code.replace(
              'Text("\\(waitInterval, specifier: "%.0f") sec")',
              'Group { if waitInterval == 0 { Text("Never") } else { Text("\\(waitInterval, specifier: "%.0f") sec") } }'
          )
          with open(sv_path, "w") as file: file.write(sv_code)

          # 3. Patch ContentView (Variables, Corrected Directions, and Stretching Animation)
          cv_path = "boringNotch/ContentView.swift"
          with open(cv_path, "r") as file: cv_code = file.read()
          
          # Add variables for tracking drag state
          cv_code = cv_code.replace(
              "struct ContentView: View {",
              "struct ContentView: View {\n    @State private var leftGestureActive = false\n    @State private var rightGestureActive = false\n    @State private var horizontalGestureActive = false\n    @State private var dragOffset: CGFloat = 0"
          )
          
          # Correct Directions: Swipe Right (>0) now does Previous, Swipe Left (<0) now does Next
          cv_code = cv_code.replace("MusicManager.shared.previousTrack()", "TEMP_BACK").replace("MusicManager.shared.nextTrack()", "MusicManager.shared.previousTrack()").replace("TEMP_BACK", "MusicManager.shared.nextTrack()")
          
          # Inject the stretching math logic
          cv_code = cv_code.replace(
              ".onChange(of: gestureWidth) {",
              "dragOffset = gestureWidth\n                .onChange(of: gestureWidth) {"
          )
          
          # Apply the "NotchNook" stretch and spring offset to the UI
          cv_code = cv_code.replace(
              "NotchHomeView()",
              "NotchHomeView().offset(x: dragOffset * 0.4).scaleEffect(x: 1 + abs(dragOffset/450), y: 1 - abs(dragOffset/1500), anchor: .center).animation(.interactiveSpring(), value: dragOffset)"
          )
          with open(cv_path, "w") as file: file.write(cv_code)

          # 4. Ensure original AirDrop image is used and visible
          fs_path = "boringNotch/components/Shelf/Views/FileShareView.swift"
          if os.path.exists(fs_path):
              with open(fs_path, "r") as f: fs_code = f.read()
              # Make sure it uses the asset "airdrop" but with template rendering so it shows up on dark backgrounds
              fs_code = fs_code.replace('Image("airdrop")', 'Image("airdrop").renderingMode(.template)')
              with open(fs_path, "w") as f: f.write(fs_code)
          
      - name: 3. Compile the App
        run: xcodebuild -project boringNotch.xcodeproj -scheme boringNotch -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build_output clean build
          
      - name: 4. Zip the App
        run: |
          cd build_output/Build/Products/Release
          zip -r BoringNotch-Custom.zip boringNotch.app

      - name: 5. Upload to you
        uses: actions/upload-artifact@v4
        with:
          name: BoringNotch-Custom
          path: build_output/Build/Products/Release/BoringNotch-Custom.zip
