name: Cloud Mac Builder

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Download the Gesture update
        run: |
          git clone https://github.com/TheBoredTeam/boring.notch.git .
          git fetch origin pull/1100/head:gestures
          git checkout gestures
          
      - name: 2. Inject your "Never Close" Tweaks
        run: |
          python3 -c '
          import os

          # Inject the timer guard into MusicManager
          mm = "boringNotch/managers/MusicManager.swift"
          with open(mm, "r") as f: content = f.read()
          content = content.replace(
              "sleep(for: .seconds(Defaults[.waitInterval]))",
              "guard Defaults[.waitInterval] > 0 else { return }; sleep(for: .seconds(Defaults[.waitInterval]))"
          )
          with open(mm, "w") as f: f.write(content)

          # Inject the "Never" text into SettingsView
          sv = "boringNotch/components/Settings/SettingsView.swift"
          with open(sv, "r") as f: content = f.read()
          content = content.replace(
              "Text(\"\\(waitInterval, specifier: \\\"%.0f\\\") sec\")",
              "(waitInterval == 0 ? Text(\"Never\") : Text(\"\\(waitInterval, specifier: \\\"%.0f\\\") sec\"))"
          )
          with open(sv, "w") as f: f.write(content)
          '
          
      - name: 3. Compile the App
        run: xcodebuild -project boringNotch.xcodeproj -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build_output clean build
          
      - name: 4. Zip the App
        run: |
          cd build_output/Build/Products/Release
          zip -r BoringNotch-Custom.zip boringNotch.app

      - name: 5. Upload to you
        uses: actions/upload-artifact@v4
        with:
          name: BoringNotch-Custom
          path: build_output/Build/Products/Release/BoringNotch-Custom.zip
