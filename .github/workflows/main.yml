name: Cloud Mac Builder

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Download the Gesture update
        uses: actions/checkout@v4
        with:
          repository: TheBoredTeam/boring.notch
          ref: refs/pull/1100/head

      - name: 2. Inject your Tweaks
        shell: python
        run: |
          # 1. Update MusicManager Safely
          mm_path = "boringNotch/managers/MusicManager.swift"
          with open(mm_path, "r") as file:
              mm_code = file.read()
          
          mm_code = mm_code.replace(
              "sleep(for: .seconds(Defaults[.waitInterval]))",
              "guard Defaults[.waitInterval] > 0 else { return }\n        sleep(for: .seconds(Defaults[.waitInterval]))"
          )
          
          with open(mm_path, "w") as file:
              file.write(mm_code)
              
          # 2. Update SettingsView Safely
          sv_path = "boringNotch/components/Settings/SettingsView.swift"
          with open(sv_path, "r") as file:
              sv_code = file.read()
              
          old_text = 'Text("\\(waitInterval, specifier: "%.0f") sec")'
          new_text = 'Group { if waitInterval == 0 { Text("Never") } else { Text("\\(waitInterval, specifier: "%.0f") sec") } }'
          sv_code = sv_code.replace(old_text, new_text)
          
          with open(sv_path, "w") as file:
              file.write(sv_code)
          
      - name: 3. Compile the App
        run: xcodebuild -project boringNotch.xcodeproj -scheme boringNotch -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build_output clean build
          
      - name: 4. Zip the App
        run: |
          cd build_output/Build/Products/Release
          zip -r BoringNotch-Custom.zip boringNotch.app

      - name: 5. Upload to you
        uses: actions/upload-artifact@v4
        with:
          name: BoringNotch-Custom
          path: build_output/Build/Products/Release/BoringNotch-Custom.zip
